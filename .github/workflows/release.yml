name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create releases / upload assets
  id-token: write # OIDC token for npm Trusted Publishing (+ provenance)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1, wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Install wasi-sdk (C toolchain so zstd-sys builds for wasm32-wasip1)
        run: |
          ver=33.0
          curl -sL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-33/wasi-sdk-${ver}-x86_64-linux.tar.gz" | sudo tar xz -C /opt
          sdk=/opt/wasi-sdk-${ver}-x86_64-linux
          echo "CC_wasm32_wasip1=$sdk/bin/clang" >> "$GITHUB_ENV"
          echo "AR_wasm32_wasip1=$sdk/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "CFLAGS_wasm32_wasip1=--sysroot=$sdk/share/wasi-sysroot" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; the runner's bundled
      # npm is older, so upgrade the CLI before publishing.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build both WASM artifacts (library + WASI runner)
        run: ./build.sh

      - name: Sync package version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: npm
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      # No NODE_AUTH_TOKEN needed: npm authenticates via the OIDC id-token from
      # the configured trusted publisher and attaches build provenance.
      - name: Publish to npm (Trusted Publishing)
        working-directory: npm
        run: npm publish --provenance --access public

      # Keep the Python package version and the runtime version it downloads in
      # lockstep with the tag, so a tag is the single source of truth.
      - name: Sync Python package version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ver="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$ver\"/" python/pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"$ver\"/" python/src/geolibre_wasm/__init__.py
          sed -i "s|^RUNTIME_VERSION = .*|RUNTIME_VERSION = \"v$ver\"|" python/src/geolibre_wasm/_core.py

      - name: Build Python wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build --outdir python-dist python

      # No token needed: PyPI authenticates via the OIDC id-token from the
      # configured trusted publisher. Requires a PyPI trusted publisher for
      # project "geolibre-wasm" (owner opengeos, repo geolibre-rust, workflow
      # release.yml); for the first release, configure it as a pending publisher.
      - name: Publish to PyPI (Trusted Publishing)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-dist

      - name: Stage release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist
          # browser library (wasm-bindgen)
          cp npm/geolibre_wasm_bg.wasm dist/geolibre_wasm_bg-${GITHUB_REF_NAME}.wasm
          cp npm/geolibre_wasm.js      dist/geolibre_wasm-${GITHUB_REF_NAME}.js
          cp npm/geolibre_wasm.d.ts    dist/geolibre_wasm-${GITHUB_REF_NAME}.d.ts
          # WASI tool runner
          cp npm/geolibre-cli.wasm     dist/geolibre-cli-${GITHUB_REF_NAME}.wasm
          cp npm/tools.mjs             dist/tools-${GITHUB_REF_NAME}.mjs
          cp npm/tools.d.ts            dist/tools-${GITHUB_REF_NAME}.d.ts
          # Python wheel + sdist
          cp python-dist/*.whl python-dist/*.tar.gz dist/
          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
